version: '3.8'

services:
  postgres-dev:
    image: postgres:17
    container_name: packoptimize-postgres-dev
    environment:
      POSTGRES_DB: packoptimize_dev
      POSTGRES_USER: packoptimize
      POSTGRES_PASSWORD: packoptimize_dev_pw
    ports:
      - '5432:5432'
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U packoptimize -d packoptimize_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:17
    container_name: packoptimize-postgres-test
    environment:
      POSTGRES_DB: packoptimize_test
      POSTGRES_USER: packoptimize
      POSTGRES_PASSWORD: packoptimize_test_pw
    ports:
      - '5433:5432'
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U packoptimize -d packoptimize_test']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: packoptimize-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-dev-data:
  postgres-test-data:
  redis-data:
